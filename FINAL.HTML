<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Healing Letter 💌</title>
<style>
/* === LOADING SCREEN === */
#loading-screen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  z-index: 9999;
}
.loading-bar-container {
  width: 200px;
  height: 8px;
  background: rgba(255,255,255,0.3);
  border-radius: 20px;
  overflow: hidden;
  margin-top: 10px;
}
.loading-bar {
  width: 0%;
  height: 100%;
  background: white;
  border-radius: 20px;
}

/* === BODY & ENVELOPE === */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
  font-family: 'Segoe UI', sans-serif;
}

.scene {
  perspective: 1000px;
}

.envelope {
  width: 15cm;
  height: 10cm;
  position: relative;
  cursor: pointer;
}

.base {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #ffb6d9, #ffc6e0);
  border-radius: 12px;
  position: absolute;
  z-index: 1;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

.flap {
  position: absolute;
  width: 100%;
  height: 7.5cm;
  background: linear-gradient(135deg, #ff9acb, #ffb6d9);
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  transform-origin: top;
  transition: transform 0.6s ease;
  z-index: 3;
  backface-visibility: hidden;
}

.letter {
  position: absolute;
  width: 90%;
  height: 6cm;
  background: #fff;
  border-radius: 10px;
  top: 20px;
  left: 5%;
  padding: 15px;
  box-sizing: border-box;
  transform: translateY(40px);
  transition: all 0.6s ease;
  opacity: 0;
  z-index: 2;
}

.open .flap {
  transform: rotateX(-150deg);
}

.open .letter {
  transform: translateY(-60px);
  opacity: 1;
}

#message {
  font-size: 15px;
  color: #444;
  line-height: 1.6;
  word-wrap: break-word;
}

.typing {
  border-right: 2px solid #a18cd1;
  white-space: normal;
}

/* === NEED HELP BUTTON & POPUP === */
.need-help {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: linear-gradient(135deg, #ff9a9e, #a18cd1);
  color: white;
  padding: 12px 18px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: 0.3s;
  animation: pulse 2s infinite;
}
.need-help:hover {
  transform: scale(1.1);
}

/* gentle pulse effect */
@keyframes pulse {
  0%,100% { box-shadow: 0 0 15px rgba(255,255,255,0.6); }
  50% { box-shadow: 0 0 30px rgba(255,255,255,1); }
}

/* POPUP */
.help-box {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.4s;
}

.help-box.active {
  opacity: 1;
  pointer-events: all;
}

.help-content {
  position: relative;
  background: linear-gradient(135deg, #ffffffaa, #f0f0f0aa);
  backdrop-filter: blur(12px);
  padding: 30px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.25);
  animation: bling 2s infinite;
}

.help-content h2 {
  color: #6a4c93;
  margin-bottom: 15px;
}

.help-content ul {
  text-align: left;
  margin: 10px 0;
  padding-left: 20px;
}

.help-content button {
  margin-top: 15px;
  padding: 8px 15px;
  border: none;
  border-radius: 10px;
  background: #a18cd1;
  color: white;
  cursor: pointer;
}

/* sparkle effect */
@keyframes bling {
  0%,100% { box-shadow: 0 0 5px rgba(255,255,255,0.5); }
  50% { box-shadow: 0 0 20px rgba(255,255,255,1); }
}

/* fade in for text */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <div class="loading-bar-container">
    <div class="loading-bar"></div>
  </div>
  <p class="loading-text">Đang tải... 0%</p>
</div>

<!-- SCENE -->
<div class="scene">
  <div class="envelope" onclick="toggleLetter(this)">
    <div class="base"></div>
    <div class="flap"></div>
    <div class="letter">
      <div id="message">Nhấn để mở thư nha 💌</div>
    </div>
  </div>
</div>

<!-- NEED HELP BUTTON -->
<div class="need-help" onclick="openHelp()">🆘 Need Here</div>

<!-- HELP POPUP -->
<div id="helpBox" class="help-box">
  <div class="help-content">
    <h2>🤍 Bạn không một mình</h2>
    <p>Nếu bạn đang cảm thấy quá tải hoặc cần giúp đỡ ngay, hãy liên hệ khẩn cấp:</p>
    <ul>
      <li>📞 Tổng đài tư vấn tâm lý: <b>19006233</b></li>
      <li>📞 Trung tâm bảo trợ trẻ em: <b>111</b></li>
    </ul>
    <p>Hoặc hãy tìm người bạn tin tưởng để chia sẻ nhé 💜</p>
    <button onclick="closeHelp()">Đóng</button>
  </div>
</div>

<script>
/* ==== MESSAGES === */
const messages = [
"Cố lên, bạn đang làm tốt hơn bạn nghĩ đó 💜",
"Một ngày tệ không định nghĩa con người bạn đâu",
"Bạn không cần hoàn hảo, chỉ cần tiếp tục là đủ",
"Rồi mọi chuyện cũng sẽ ổn thôi",
"Bạn xứng đáng được yêu thương",
"Chậm một chút không sao, miễn là bạn không dừng lại",
"Đừng quá khắt khe với bản thân nhé",
"Bạn đang đi đúng hướng rồi",
"Khóc cũng được, yếu đuối cũng không sao",
"Bạn không một mình đâu 🤍",
"Thời gian sẽ chữa lành mọi thứ",
"Hãy nghỉ ngơi nếu bạn mệt",
"Bạn đã cố gắng, vậy là đủ rồi",
"Love yourself 💕",
"Everything will be okay ☺️” – đó không chỉ là một câu nói, mà là cách mình chọn để tin vào cuộc sống. Cuộc sống vốn dĩ không phải lúc nào cũng rực rỡ. Sẽ có những ngày thật khó khăn, những lúc ta chênh vênh và mỏi mệt. Nhưng cũng sẽ có những khoảnh khắc may mắn, những niềm vui nhỏ bé, và cả những ngày bình thường đến mức tưởng như vô nghĩa. Chính tất cả những điều đó mới tạo nên một cuộc đời đầy màu sắc. Mọi chuyện rồi sẽ ổn thôi. Và nếu có lúc bạn thấy quá mệt, hãy cho phép bản thân được dừng lại một chút. Nghỉ ngơi không phải là bỏ cuộc, mà là để lấy lại sức mạnh để bước tiếp. Hãy dịu dàng với chính mình hơn. Bạn xứng đáng được yêu thương — trước hết là từ chính bạn.",
"Cố gắng lên mọi chuyện rồi cũng sẽ ổn thôi. Thời gian này có hơi khó khăn và áp lực 1 chút nhưng mong rằng bạn không từ bỏ ý định của mình.",
"Bạn không bị tụt lại phía sau đâu, bạn chỉ đang đi trên con đường của riêng mình thôi. Có người đến đích sớm, có người đi vòng vèo hơn một chút, nhưng điều đó không làm giá trị của bạn thấp đi. Mỗi trải nghiệm bạn đang có – dù là sai lầm, thất bại hay những lần cảm thấy “mình chẳng là gì cả” – đều đang âm thầm giúp bạn hiểu bản thân hơn.",
"An ủi, động viên, nếu được thì kết bạn với họ và trong khoảng thời gian chơi chung thì khen những điều nhỏ nhặt họ làm, như vậy sẽ khiến họ thấy vui hơn",
"Tìm cho mình một điểm tựa, nếu không có điểm tựa hãy tìm lấy 1 lý do để tồn tại và phấn đấu hết mình cho nó là được. Tin tôi đi chỉ cần còn sống mọi khó khăn đều có thể giải quyết",
"Có thể hiện tại bạn chưa có gì nổi bật, chưa có thành tựu lớn, nhưng điều đó không quyết định tương lai của bạn. Rất nhiều người đã bắt đầu muộn, đã từng lạc hướng, nhưng rồi họ vẫn tìm được con đường phù hợp với mình.",
"Cố gắng hết mình , đến một lúc nào đó bạn nhìn lại và sẽ bất ngờ vì mình đã nỗ lực vượt qua nó như thế nào",
"Rồi sẽ có một ngày, bạn ngồi đâu đó rất bình yên, và nhận ra rằng mình đã đi qua những khoảng thời gian khó khăn nhất rồi. Những điều từng làm bạn đau, từng khiến bạn nghi ngờ chính mình… cuối cùng cũng chỉ là một phần của hành trình trưởng thành.",
"Mình tin rằng ai trong chúng ta cũng có những áp lực vô hình phải gồng gánh nhưng mình tin rằng đó chỉ là nỗi sợ trong tâm trí kiềm hãm sự phát triển của bạn vì thế nếu quá mệt mỏi hay nghỉ ngơi, hãy cho mk thời gian để chữa lành, luôn vững tin bản thân sẽ làm được",
"Đối với mình thì bản thân đang gặp vấn đề tiêu cực tốt nhất không nên chia sẻ cho bất kì ai xung quanh, bởi vì năng lượng xấu sẽ ảnh hưởng đến họ. Thay vì đó, bạn nên dành ra 1 chút ít sự rộng lượng cho bản thân và thử tìm đến các chuyên gia, bác sĩ về tâm lý, tâm thần.",
"Rồi sẽ có một ngày, bạn nhìn lại và nhận ra: “À, hóa ra những lúc mình tưởng như vô nghĩa nhất, lại là lúc mình đang lớn lên nhiều nhất.”",
"Sẽ có những lúc bạn cảm thấy mình bị bỏ lại phía sau, như thể cả thế giới đang tiến lên còn mình thì đứng yên. Nhưng sự thật là: mỗi người đều có một nhịp sống khác nhau. Có những thứ đến muộn một chút, nhưng lại đến đúng lúc bạn sẵn sàng nhất.",
"Tôi động viên họ hãy dũng cảm đối diện với cảm xúc của mình, cho phép mình cơ hội sửa chữa và thay đổi lối sống tích cực hơn để tìm cho mình những nguồn mạch sống giúp mình có được sự lạc quan hơn về cuộc sống",
"có thể có một số thử thách khó khắn, rủi ro và nguy hiểm, nhưng cậu đừng nhìn lại phía sau nữa nhé, hãy tận hưởng chuyến đi của cuộc sống cậu, nếu cậu buồn, chỉ cần buồn, nếu cậu vui, hãy vui lên, đó là cuộc sống, cứ tiến về phía trước nhé 💜",
"Cố lên rồi đâu cũng vào đấy, tự tin là chìa khoá mở ra cánh cửa bước tiếp cho 1 hành trình mới trong tương lai. Lạc quan, nổ lực, kiên trì rồi sẽ nhận lại được thành quả xứng đáng. Không ngừng bỏ cuộc, vì cuộc đời tuổi trẻ là những trải nghiệm, có vấp ngã mới có thành công. “Nếu cuộc đời không rực rỡ thì sao?” Thì lấy màu khác tô đậm nó lên không để nó chỉ nằm ở màu trắng và đen ( tự mình nổ lực làm cho cuộc đời mình rực rỡ)",
"Có thể bạn không nhận ra, nhưng việc bạn vẫn đang cố gắng mỗi ngày – dù chỉ là dậy đi học, đi làm, hay hoàn thành một việc nhỏ – đã là một điều rất đáng ghi nhận rồi. Không phải ai cũng đủ sức để tiếp tục khi trong lòng còn nhiều rối bời như vậy.",
"Hãy cố gắng và tự chính bản thân vượt quá khó khăn đôi khi bản thân có mệt mỏi nhưng mình phải thật cố gắng , chỉ có chính mình mới quyết định được cuốc sống của mình",
"Nếu hôm nay bạn thấy mọi thứ quá khó khăn, thì hãy thu nhỏ nó lại. Đừng nghĩ đến cả chặng đường dài, chỉ cần nghĩ đến bước tiếp theo thôi. Làm được một việc nhỏ cũng đã là tiến lên rồi.",
"Những ngày khó khăn sẽ không kéo dài mãi mãi đâu, nên hãy kiên trì, mạnh mẽ lên, tích cực lên và đối xử tốt với bản thân mình nhé. Quả ngọt sẽ đến với bạn nếu bạn đủ kiên trì.",
"Sẽ có những lúc bạn cảm thấy mình thua kém người khác. Nhưng thật ra, bạn chỉ đang nhìn thấy “kết quả” của họ, còn những ngày họ từng chật vật, từng muốn bỏ cuộc, bạn không thấy được. Ai cũng có một phần câu chuyện mà họ không nói ra.",
"Sống tích cực lên, chuyện gì cố gắng giải quyết mà ko giải quyết được thì cứ cho qua, làm vậy sẽ thấy nhẹ nhàng, đỡ stress hơn. Rồi điều tích cực sẽ đến, hãy vui vì những việc nhỏ nhặt nhất.",
"mưa nào mà mưa hong tạnh, hãy cứ cố gắng thì sẽ thấy ánh nắng thui",
];

/* ==== TOGGLE LETTER === */
let isOpen = false;
function toggleLetter(el) {
  if (!isOpen) {
    el.classList.add("open");
    isOpen = true;
    setTimeout(generateMessage, 400);
  } else {
    el.classList.remove("open");
    isOpen = false;
  }
}

/* ==== TYPE MESSAGE === */
function generateMessage() {
  const box = document.getElementById("message");
  const text = messages[Math.floor(Math.random() * messages.length)];

  box.innerHTML = "";
  box.classList.add("typing");

  let i = 0;
  function type() {
    if (i < text.length) {
      box.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 25);
    } else {
      box.classList.remove("typing");
    }
  }
  type();
}

/* ==== LOADING BAR === */
let progress = 0;
let loadingText = document.querySelector(".loading-text");
let loadingBar = document.querySelector(".loading-bar");

let interval = setInterval(() => {
  progress++;
  loadingBar.style.width = progress + "%";
  loadingText.innerText = "Đang tải... " + progress + "%";

  if (progress >= 100) {
    clearInterval(interval);
    document.getElementById("loading-screen").style.display = "none";
  }
}, 15);

/* ==== HELP POPUP === */
function openHelp() {
  document.getElementById("helpBox").classList.add("active");
}
function closeHelp() {
  document.getElementById("helpBox").classList.remove("active");
}
</script>
</body>
</html>
